<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Postcard</title>

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&family=Shadows+Into+Light&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <div class="postcard">
        <!-- Logo -->
        <img
          class="logo"
          src="http://assets.breatheco.de/apis/img/icon/4geeks.png"
          alt="4Geeks Logo"
        />

        <!-- Left Column -->
        <div class="left-column">
          <h1>My Postcard</h1>
          <p>
            Look how awesome! This is a postcard that I created using HTML5 and
            CSS3 during my “4Geeks Academy Course!”
          </p>
          <p>
            This is so cool, can’t wait to start doing more stuff!
          </p>
        </div>

        <!-- Right Column -->
        <div class="right-column">
          <form>
            <div class="form-group">
              <label for="name">Some Name</label>
              <input type="text" id="name" name="name" />
            </div>

            <div class="form-group">
              <label for="email">Some Email</label>
              <input type="email" id="email" name="email" />
            </div>

            <div class="form-group">
              <label for="comment">Some comment</label>
              <textarea id="comment" name="comment"></textarea>
            </div>

            <button type="submit" class="btn-primary">
              Send My Postcard
            </button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
